<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상 아카이브 & 검수 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="app/styles.css">
</head>
<body>
<div class="grain"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="app/data.js"></script>
<script type="text/babel" src="app/shell.jsx"></script>
<script type="text/babel" src="app/dashboard.jsx"></script>
<script type="text/babel" src="app/search.jsx"></script>
<script type="text/babel" src="app/report.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

function App() {
  const [route, setRoute] = useState({ name: "dashboard", params: {} });

  const go = useCallback((name, params) => {
    setRoute({ name, params: params || {} });
    window.scrollTo({ top: 0, behavior: "auto" });
  }, []);

  let view;
  if (route.name === "dashboard") view = <Dashboard go={go} />;
  else if (route.name === "search") view = <Search go={go} />;
  else if (route.name === "upload") view = <Upload go={go} />;
  else if (route.name === "report") view = <Report route={route} go={go} />;
  else view = <Dashboard go={go} />;

  return (
    <div className="app">
      <CustomCursor />
      <Nav route={route} go={go} />
      {view}
      <Foot />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
